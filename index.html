<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BunkBuddy — NIET Attendance Tracker</title>
    <meta name="description"
        content="Track your college attendance at NIET. Know your bunk limit, attendance %, and get motivated. Made for NIET students." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #07070f;
            --bg2: #0d0d1c;
            --bg3: #13132a;
            --border: #1e1e3f;
            --border2: #2b2b5a;
            --violet: #7c3aed;
            --vlight: #a78bfa;
            --pink: #f472b6;
            --green: #4ade80;
            --yellow: #facc15;
            --red: #f87171;
            --text: #f0f0ff;
            --muted: #6b6b9a;
            --dim: #3a3a6a;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124, 58, 237, .04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, .04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding: 3rem 0 2.5rem;
        }

        .badge {
            display: inline-block;
            font-family: 'Outfit', sans-serif;
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--vlight);
            background: rgba(124, 58, 237, .12);
            border: 1px solid var(--border2);
            padding: .3rem 1rem;
            border-radius: 100px;
            margin-bottom: 1.25rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3.2rem, 12vw, 6rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -.04em;
            background: linear-gradient(135deg, #fff 0%, var(--vlight) 50%, var(--pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: .6rem;
        }

        .tagline {
            color: var(--muted);
            font-size: .95rem;
        }

        .tagline strong {
            color: var(--vlight);
            font-weight: 600;
        }

        /* ── CARD ── */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.25rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--violet), var(--pink), transparent);
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 1.75rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* ── FORM ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.1rem;
        }

        .full {
            grid-column: 1 / -1;
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: .45rem;
        }

        label {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input,
        select {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .85rem 1rem;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: .98rem;
            font-weight: 500;
            outline: none;
            width: 100%;
            -webkit-appearance: none;
            transition: border .2s, box-shadow .2s;
        }

        input:focus,
        select:focus {
            border-color: var(--violet);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, .18);
        }

        input::placeholder {
            color: var(--dim);
        }

        select option {
            background: var(--bg2);
        }

        .hint {
            font-size: .7rem;
            color: var(--muted);
            margin-top: .15rem;
        }

        /* ── BUTTONS ── */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: .02em;
            cursor: pointer;
            transition: transform .25s cubic-bezier(.34, 1.56, .64, 1), box-shadow .25s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--violet), #9333ea 50%, var(--pink));
            color: #fff;
            box-shadow: 0 4px 24px rgba(124, 58, 237, .4);
            margin-top: 1.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(124, 58, 237, .6);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--muted);
            margin-top: .6rem;
        }

        .btn-ghost:hover {
            border-color: var(--violet);
            color: var(--vlight);
            background: rgba(124, 58, 237, .06);
            transform: none;
        }

        /* ── RESULTS ── */
        #results {
            display: none;
        }

        #results.show {
            display: block;
            animation: fadeUp .5s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greet {
            font-family: 'Outfit', sans-serif;
            font-size: 1.65rem;
            font-weight: 800;
            margin-bottom: 1.25rem;
        }

        /* ── RING CARD ── */
        .ring-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 1.25rem;
        }

        .ring-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .ring-wrap svg {
            display: block;
            transform: rotate(-90deg);
        }

        .ring-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .ring-pct {
            font-family: 'Outfit', sans-serif;
            font-size: 1.7rem;
            font-weight: 900;
            line-height: 1;
        }

        .ring-lbl {
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .ring-info h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: .5rem;
        }

        .ring-info p {
            color: var(--muted);
            font-size: .88rem;
            line-height: 1.6;
        }

        /* ── STATS ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .sc {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.4rem 1rem;
            text-align: center;
            transition: transform .2s, border-color .2s;
        }

        .sc:hover {
            transform: translateY(-3px);
            border-color: var(--border2);
        }

        .sc-lbl {
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: .4rem;
        }

        .sc-val {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            line-height: 1;
        }

        .sc-sub {
            font-size: .72rem;
            color: var(--muted);
            margin-top: .25rem;
        }

        /* colours */
        .cg {
            color: var(--green);
        }

        .cy {
            color: var(--yellow);
        }

        .cr {
            color: var(--red);
        }

        .cv {
            color: var(--vlight);
        }

        .cp {
            color: var(--pink);
        }

        /* ── INFO BOXES ── */
        .ib {
            border-radius: 16px;
            padding: 1.15rem 1.4rem;
            margin-bottom: .9rem;
            border: 1px solid;
            display: flex;
            align-items: flex-start;
            gap: .9rem;
        }

        .ib.safe {
            background: rgba(74, 222, 128, .05);
            border-color: rgba(74, 222, 128, .22);
        }

        .ib.warn {
            background: rgba(250, 204, 21, .05);
            border-color: rgba(250, 204, 21, .22);
        }

        .ib.danger {
            background: rgba(248, 113, 113, .05);
            border-color: rgba(248, 113, 113, .22);
        }

        .ib-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .ib-body strong {
            font-size: .88rem;
            font-weight: 700;
            display: block;
            margin-bottom: .2rem;
        }

        .ib-body p {
            font-size: .83rem;
            color: var(--muted);
            line-height: 1.55;
        }

        /* ── MOTIVATION ── */
        .motive {
            background: linear-gradient(135deg, rgba(124, 58, 237, .15), rgba(244, 114, 182, .12));
            border: 1px solid rgba(124, 58, 237, .28);
            border-radius: 24px;
            padding: 2rem 1.75rem;
            text-align: center;
            margin: 1.25rem 0;
            position: relative;
            overflow: hidden;
        }

        .motive::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(124, 58, 237, .12), transparent 65%);
            pointer-events: none;
        }

        .mot-tag {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--vlight);
            margin-bottom: .9rem;
        }

        .mot-q {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: .6rem;
        }

        .mot-sub {
            font-size: .88rem;
            color: var(--muted);
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border2), transparent);
            margin: 1.25rem 0;
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 2.5rem 0 1rem;
            font-size: .82rem;
            color: var(--dim);
        }

        footer .hi {
            color: var(--pink);
            font-weight: 700;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 580px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
            }

            .stats .sc:last-child {
                grid-column: 1/-1;
            }

            .ring-card {
                flex-direction: column;
                text-align: center;
            }

            .card {
                padding: 1.6rem 1.1rem;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">

        <!-- HEADER -->
        <header class="header">
            <div class="badge">✦ NIET · Attendance Tracker</div>
            <h1>BunkBuddy</h1>
            <p class="tagline">NIET's most <strong>honest</strong> friend. No cap. 💜</p>
        </header>

        <!-- FORM CARD -->
        <div class="card" id="formCard">
            <div class="card-title">📋 Enter Your Details</div>
            <form id="mainForm" onsubmit="calculate(event)">
                <div class="grid">

                    <div class="fg">
                        <label for="uname">Your Name</label>
                        <input id="uname" type="text" placeholder="e.g. Priya" required />
                    </div>

                    <div class="fg">
                        <label for="sem">Semester</label>
                        <select id="sem" required>
                            <option value="" disabled selected>Select</option>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                            <option value="4">Semester 4</option>
                            <option value="5">Semester 5</option>
                            <option value="6">Semester 6</option>
                            <option value="7">Semester 7</option>
                            <option value="8">Semester 8</option>
                        </select>
                    </div>

                    <div class="fg">
                        <label for="total">Total Classes Held</label>
                        <input id="total" type="number" placeholder="e.g. 120" min="1" required />
                    </div>

                    <div class="fg">
                        <label for="attended">Classes Attended</label>
                        <input id="attended" type="number" placeholder="e.g. 90" min="0" required />
                    </div>

                    <div class="fg full">
                        <label for="future">Planned Future Absences <span
                                style="opacity:.45;font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
                        <input id="future" type="number" placeholder="Classes you plan to skip next..." min="0" />
                        <p class="hint">Leave blank if you're being responsible 👀</p>
                    </div>

                </div>
                <button type="submit" class="btn btn-primary">Calculate My Fate 🎲</button>
            </form>
        </div>

        <!-- RESULTS -->
        <div id="results">
            <div class="greet" id="greetMsg"></div>

            <!-- Progress Ring -->
            <div class="ring-card">
                <div class="ring-wrap">
                    <svg width="116" height="116" viewBox="0 0 116 116">
                        <circle cx="58" cy="58" r="48" fill="none" stroke="#1e1e3f" stroke-width="10" />
                        <circle id="progRing" cx="58" cy="58" r="48" fill="none" stroke="var(--violet)"
                            stroke-width="10" stroke-linecap="round" stroke-dasharray="301.6" stroke-dashoffset="301.6"
                            style="transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1),stroke .4s" />
                    </svg>
                    <div class="ring-center">
                        <div class="ring-pct" id="ringPct">0%</div>
                        <div class="ring-lbl">attend.</div>
                    </div>
                </div>
                <div class="ring-info">
                    <h3 id="statusHead"></h3>
                    <p id="statusBody"></p>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="sc">
                    <div class="sc-lbl">Absent Days</div>
                    <div class="sc-val cr" id="sAbsent">—</div>
                    <div class="sc-sub">missed classes</div>
                </div>
                <div class="sc">
                    <div class="sc-lbl">Attendance %</div>
                    <div class="sc-val" id="sPct">—</div>
                    <div class="sc-sub">of total classes</div>
                </div>
                <div class="sc">
                    <div class="sc-lbl">Safe to Bunk</div>
                    <div class="sc-val cy" id="sSafe">—</div>
                    <div class="sc-sub">more classes</div>
                </div>
            </div>

            <!-- Insight -->
            <div id="insightBox"></div>

            <!-- Future projection -->
            <div id="futureBox"></div>

            <div class="divider"></div>

            <!-- Motivation -->
            <div class="motive">
                <div class="mot-tag" id="motTag"></div>
                <div class="mot-q" id="motQ"></div>
                <div class="mot-sub" id="motSub"></div>
            </div>

            <button class="btn btn-ghost" onclick="resetForm()">↩ Recalculate</button>
        </div>

    </div><!-- /wrap -->

    <!-- FOOTER -->
    <footer>
        <p>Built with 💜 for <span class="hi">NIET</span> &nbsp;·&nbsp; Made by <span class="hi">Dishi</span></p>
    </footer>

    <script>
        const SEM_MSG = {
            "1": { q: "Welcome to college! The grind starts now — make good habits early.", s: "Sem 1 jitters are real, but attendance is your first assignment. Nail it! 🚀" },
            "2": { q: "Still fresh, still figuring it out — don't lose momentum.", s: "Sem 2 is when routine sets in. Set yours right. 📚" },
            "3": { q: "Mid-game activated. Core subjects = core attendance.", s: "Sem 3 is no joke. Show up and show out. 🔥" },
            "4": { q: "Halfway there. Don't throw it away now.", s: "Sem 4 — you can see the finish line. Stay locked in. 💪" },
            "5": { q: "Pre-placement era. Your record is being written RIGHT NOW.", s: "Sem 5 defines your college story. Every class counts. 🎯" },
            "6": { q: "Placement season is knocking. Sharpen everything — including attendance.", s: "Sem 6 grads land jobs. Don't let low attendance pull you back. 💼" },
            "7": { q: "Final lap. You've survived this far — finish loud.", s: "Sem 7, you're almost a NIET legend. Don't ghost your classes now. 👑" },
            "8": { q: "Last chapter. Write it like the final boss you are.", s: "Sem 8 is your victory lap. Graduate with your head held high. 🎓✨" }
        };

        function calculate(e) {
            e.preventDefault();

            const name = document.getElementById('uname').value.trim();
            const sem = document.getElementById('sem').value;
            const total = parseInt(document.getElementById('total').value);
            const done = parseInt(document.getElementById('attended').value);
            const future = parseInt(document.getElementById('future').value) || 0;

            if (done > total) { alert("Attended classes can't exceed total classes! 🤔"); return; }

            const absent = total - done;
            const pct = (done / total) * 100;

            // Classes needed to cross 75%: (done+x)/(total+x) >= 0.75 → x=(0.75*total-done)/0.25
            const needed = pct < 75 ? Math.ceil((0.75 * total - done) / 0.25) : 0;

            // Safe bunks while staying ≥ 75%: (done)/(total+x)=0.75 → x=done/0.75-total
            const safe = pct >= 75 ? Math.max(0, Math.floor(done / 0.75 - total)) : 0;

            // Future projection
            const projPct = future > 0 ? (done / (total + future)) * 100 : null;

            // Colour logic
            let ringColor, pctClass;
            if (pct >= 75) { ringColor = 'var(--green)'; pctClass = 'cg'; }
            else if (pct >= 70) { ringColor = 'var(--yellow)'; pctClass = 'cy'; }
            else { ringColor = 'var(--red)'; pctClass = 'cr'; }

            // Greeting
            const h = new Date().getHours();
            const g = h < 12 ? 'Good morning' : h < 18 ? 'Hey' : 'Yo';
            document.getElementById('greetMsg').innerHTML =
                `${g}, <span style="color:var(--vlight)">${name}</span> 👋`;

            // Ring animation
            const circ = 301.6;
            const ring = document.getElementById('progRing');
            ring.style.stroke = ringColor;
            setTimeout(() => ring.style.strokeDashoffset = circ - (Math.min(pct, 100) / 100) * circ, 60);

            const rp = document.getElementById('ringPct');
            rp.textContent = pct.toFixed(1) + '%';
            rp.className = 'ring-pct ' + pctClass;

            // Status headline
            let head, body;
            if (pct >= 85) { head = "Absolutely smashing it 🔥"; body = `${pct.toFixed(1)}% — NIET is proud of you!`; }
            else if (pct >= 75) { head = "Safe zone — don't get lazy 😤"; body = `${pct.toFixed(1)}% — just over 75%. Stay consistent.`; }
            else if (pct >= 65) { head = "Yellow flag ⚠️ Borderline zone"; body = `${pct.toFixed(1)}% — a few more skips and you're cooked.`; }
            else if (pct >= 55) { head = "Code Red 😬 Attendance is scary"; body = `${pct.toFixed(1)}% — time to show up or face consequences.`; }
            else { head = "SOS 🚨 Emergency-level attendance"; body = `${pct.toFixed(1)}% — your HOD probably knows your name.`; }

            document.getElementById('statusHead').textContent = head;
            document.getElementById('statusBody').textContent = body;

            // Stats
            document.getElementById('sAbsent').textContent = absent;
            const ps = document.getElementById('sPct');
            ps.textContent = pct.toFixed(1) + '%';
            ps.className = 'sc-val ' + pctClass;
            document.getElementById('sSafe').textContent = safe;

            // Insight box
            const ib = document.getElementById('insightBox');
            if (pct >= 75) {
                ib.innerHTML = `<div class="ib safe">
        <div class="ib-icon">✅</div>
        <div class="ib-body">
          <strong>You're in the safe zone!</strong>
          <p>You can bunk <strong>${safe} more classes</strong> and still stay above 75%. Use the margin wisely.</p>
        </div></div>`;
            } else {
                ib.innerHTML = `<div class="ib ${pct >= 65 ? 'warn' : 'danger'}">
        <div class="ib-icon">${pct >= 65 ? '⚠️' : '🚨'}</div>
        <div class="ib-body">
          <strong>${pct >= 65 ? 'Attendance Warning' : 'Critical Attendance Alert'}</strong>
          <p>You need to attend the next <strong>${needed} consecutive classes</strong> without skipping a single one to cross 75%.</p>
        </div></div>`;
            }

            // Future projection
            const fb = document.getElementById('futureBox');
            if (projPct !== null) {
                const cls = projPct >= 75 ? 'safe' : projPct >= 65 ? 'warn' : 'danger';
                const icon = projPct >= 75 ? '🟢' : projPct >= 65 ? '🟡' : '🔴';
                const msg = projPct >= 75
                    ? "You'll still stay above 75%. Responsible bunking! ✌️"
                    : "That's going to hurt your attendance. Reconsider! 👀";
                fb.innerHTML = `<div class="ib ${cls}" style="margin-top:.25rem">
        <div class="ib-icon">${icon}</div>
        <div class="ib-body">
          <strong>Planned Absence Projection</strong>
          <p>If you skip <strong>${future} more classes</strong>, attendance will drop to <strong>${projPct.toFixed(1)}%</strong>. ${msg}</p>
        </div></div>`;
            } else {
                fb.innerHTML = '';
            }

            // Motivation
            const m = SEM_MSG[sem];
            document.getElementById('motTag').textContent = `— Semester ${sem} Pep Talk ✨`;
            document.getElementById('motQ').textContent = `"${m.q}"`;
            document.getElementById('motSub').textContent = m.s;

            // Show results
            document.getElementById('formCard').style.display = 'none';
            const res = document.getElementById('results');
            res.classList.add('show');
            res.scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('results').classList.remove('show');
            document.getElementById('formCard').style.display = 'block';
            document.getElementById('mainForm').reset();
